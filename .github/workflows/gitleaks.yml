name: gitleaks

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Run gitleaks (full history)
        if: github.event_name == 'push'
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --no-banner \
            --redact
